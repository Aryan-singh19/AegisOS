name: Auto Docs

on:
  push:
    branches: [main]
    paths-ignore:
      - "EXPLAIN.md"
      - "CHANGELOG.md"
  workflow_dispatch:

jobs:
  generate-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate EXPLAIN and CHANGELOG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/update_project_docs.py --heatmap-window weekly

      - name: Detect docs changes
        id: changes
        run: |
          if git diff --quiet -- EXPLAIN.md CHANGELOG.md; then
            echo "No docs changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create docs update pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: auto-update explain and changelog"
          title: "docs: auto-update explain and changelog"
          body: |
            Automated docs refresh from workflow.
            - Updates `EXPLAIN.md`
            - Updates `CHANGELOG.md`
          branch: "bot/docs-auto-update"
          delete-branch: true
          add-paths: |
            EXPLAIN.md
            CHANGELOG.md
