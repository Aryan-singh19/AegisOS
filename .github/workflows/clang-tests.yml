name: Clang Matrix

on:
  push:
    branches: [main]
    paths-ignore:
      - "EXPLAIN.md"
      - "CHANGELOG.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "EXPLAIN.md"
      - "CHANGELOG.md"

jobs:
  clang-build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        c_standard: ["c11", "c17"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Build and run kernel tests
        run: |
          clang -std=${{ matrix.c_standard }} -Wall -Wextra -Wpedantic -Ikernel/include \
            kernel/src/kernel_main.c tests/kernel_sim_test.c -o out_kernel_test
          ./out_kernel_test

      - name: Build and run capability tests
        run: |
          clang -std=${{ matrix.c_standard }} -Wall -Wextra -Wpedantic -Iuserland/include \
            userland/security/capability.c tests/capability_test.c -o out_capability_test
          ./out_capability_test

      - name: Build and run sandbox policy tests
        run: |
          clang -std=${{ matrix.c_standard }} -Wall -Wextra -Wpedantic -Iuserland/include \
            userland/security/sandbox_policy.c tests/sandbox_policy_test.c -o out_sandbox_policy_test
          ./out_sandbox_policy_test

      - name: Build and run sandbox engine tests
        run: |
          clang -std=${{ matrix.c_standard }} -Wall -Wextra -Wpedantic -Iuserland/include \
            userland/security/capability.c \
            userland/security/sandbox_policy.c \
            userland/security/sandbox_engine.c \
            tests/sandbox_engine_test.c -o out_sandbox_engine_test
          ./out_sandbox_engine_test

  clang-sanitizers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Build and run capability tests with ASAN+UBSAN
        run: |
          clang -std=c11 -Wall -Wextra -Wpedantic -fsanitize=address,undefined -fno-omit-frame-pointer \
            -Iuserland/include userland/security/capability.c tests/capability_test.c -o out_capability_san
          ./out_capability_san

      - name: Build and run sandbox engine tests with ASAN+UBSAN
        run: |
          clang -std=c11 -Wall -Wextra -Wpedantic -fsanitize=address,undefined -fno-omit-frame-pointer \
            -Iuserland/include \
            userland/security/capability.c \
            userland/security/sandbox_policy.c \
            userland/security/sandbox_engine.c \
            tests/sandbox_engine_test.c -o out_sandbox_engine_san
          ./out_sandbox_engine_san
