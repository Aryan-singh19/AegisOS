name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required docs exist
        run: |
          test -f README.md
          test -f docs/VISION.md
          test -f docs/ARCHITECTURE.md
          test -f docs/SECURITY_MODEL.md
          test -f docs/ROADMAP.md

