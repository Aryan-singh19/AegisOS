name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-kernel-sim:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B out -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build out --config Release --parallel

      - name: Test
        run: ctest --test-dir out --output-on-failure

